#   reason:     Reason for inclusion (required)
#   ha_version: HA version where applicable, "*" = all (optional, defaults to "*")
#   added:      ISO date (YYYY-MM-DD)
#   issue:      URL of the issue in this repo that originated the entry

repositories: []
