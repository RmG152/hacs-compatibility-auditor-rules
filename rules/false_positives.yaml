# False Positives: specific issues that should be ignored in compatibility scoring
# Useful when an issue has labels like "breaking" or "incompatible" but
# is not actually relevant (e.g., label was not cleaned up after the issue was resolved).
#
# Format:
#   full_name:    "owner/repo" (required)
#   issue_number: GitHub issue number (required)
#   reason:       Reason why it is a false positive (required)
#   added:        ISO date (YYYY-MM-DD)
#   issue:        URL of the issue in this repo that originated the entry

issues: []
